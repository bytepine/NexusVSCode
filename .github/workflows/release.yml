name: Release

on:
  push:
    tags:
      - "nexus-vscode-v*"

permissions:
  contents: write

jobs:
  release:
    name: nexus-vscode
    runs-on: ubuntu-latest
    env:
      # 配置在仓库 Settings > Secrets 后才会发布到对应商店；缺失则跳过该步骤
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#nexus-vscode-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi
          FILE_VERSION="$(tr -d '\r\n' < VERSION)"
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "VERSION ($FILE_VERSION) != tag ($VERSION)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build VSIX
        run: |
          python scripts/build_vscode.py --version "${{ steps.meta.outputs.version }}" --output release/

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # 门禁：VERSION 与 CHANGELOG [X.Y.Z] 必须就绪；body 仅来源于 CHANGELOG，禁止手写
          python scripts/extract_release_notes.py --version "$VERSION" --verify \
            --output release-notes.md
          echo "--- Release notes preview (CHANGELOG [$VERSION]) ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nexus MCP VSCode v${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          files: release/nexus-mcp-vscode-${{ steps.meta.outputs.version }}.vsix
          generate_release_notes: false
          overwrite: true

      # 覆盖 Cursor / CodeBuddy / Windsurf / VSCodium 等（默认走 Open VSX）
      - name: Publish to Open VSX
        if: ${{ env.OVSX_TOKEN != '' }}
        run: >-
          npx -y ovsx publish
          release/nexus-mcp-vscode-${{ steps.meta.outputs.version }}.vsix
          -p "$OVSX_TOKEN"

      # 覆盖微软官方 VS Code
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: >-
          npx -y @vscode/vsce publish
          --packagePath release/nexus-mcp-vscode-${{ steps.meta.outputs.version }}.vsix
          -p "$VSCE_PAT"
