name: Release

on:
  push:
    tags:
      - "nexus-vscode-v*"

permissions:
  contents: write

jobs:
  release:
    name: nexus-vscode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#nexus-vscode-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi
          FILE_VERSION="$(tr -d '\r\n' < VERSION)"
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "VERSION ($FILE_VERSION) != tag ($VERSION)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build VSIX
        run: |
          python scripts/build_vscode.py --version "${{ steps.meta.outputs.version }}" --output release/

      - name: Extract release notes
        run: |
          python scripts/extract_release_notes.py \
            --version "${{ steps.meta.outputs.version }}" \
            --output release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nexus MCP VSCode v${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          files: release/nexus-mcp-vscode-${{ steps.meta.outputs.version }}.vsix
          generate_release_notes: false
